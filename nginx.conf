# ============================================================
# Pellets Analyzer — Nginx конфигурация (обратный прокси)
# ============================================================
# Используется вместе с docker-compose.yml
# SSL сертификаты положить в ./ssl/
# ============================================================

events {
    worker_connections 1024;
}

http {
    # --- Безопасность ---
    # Скрытие версии nginx
    server_tokens off;
    
    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security заголовки
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_status 429;
    
    # Размер загружаемых файлов
    client_max_body_size 50M;
    
    # Буферы
    client_body_buffer_size 128k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    
    upstream pellets_app {
        server web:5000;
    }
    
    server {
        listen 80;
        server_name your-domain.com;
        
        # Перенаправление HTTP -> HTTPS
        return 301 https://$server_name$request_uri;
    }
    
    server {
        listen 443 ssl http2;
        server_name your-domain.com;
        
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        
        # --- Логи ---
        access_log /var/log/nginx/pellets-access.log;
        error_log /var/log/nginx/pellets-error.log;
        
        # --- Статические файлы (раздача напрямую через nginx) ---
        location /static/ {
            alias /app/static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
        
        # --- Загрузка файлов ---
        location /uploads/ {
            alias /app/Uploads/;
            internal;  # Доступ только через приложение
        }
        
        # --- Основное приложение ---
        location / {
            limit_req zone=general burst=20 nodelay;
            
            proxy_pass http://pellets_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Таймауты
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }
        
        # --- Защита эндпоинтов авторизации ---
        location /auth/login {
            limit_req zone=login burst=3 nodelay;
            
            proxy_pass http://pellets_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /auth/register {
            limit_req zone=login burst=3 nodelay;
            
            proxy_pass http://pellets_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # --- API endpoints ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            
            proxy_pass http://pellets_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # --- Запрет доступа к скрытым файлам ---
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # --- Запрет доступа к конфигам ---
        location ~* \.(json|yml|yaml|env|ini|cfg|conf)$ {
            deny all;
        }
    }
}
