volumes:
  # Именованные volumes — сохраняются при docker-compose down
  # Для полного удаления: docker-compose down --volumes
  app_data:
    name: pellets-app-data
  uploads:
    name: pellets-uploads
  sessions:
    name: pellets-sessions
  ml_models:
    name: pellets-ml-models
  # postgres_data:

networks:
  pellets-net:
    driver: bridge
