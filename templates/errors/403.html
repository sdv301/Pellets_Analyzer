<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 — Доступ запрещён</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #08080a;
            color: #e8e8ed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; }

        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 80% 60% at 50% 0%, rgba(239, 68, 68, 0.10) 0%, transparent 70%),
                radial-gradient(ellipse 50% 50% at 20% 80%, rgba(245, 158, 11, 0.06) 0%, transparent 60%),
                #08080a;
        }

        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .error-container {
            text-align: center;
            padding: 24px;
            position: relative;
            z-index: 1;
            max-width: 600px;
        }

        .error-code {
            font-size: clamp(100px, 20vw, 180px);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #ef4444 0%, #f59e0b 50%, #eab308 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            animation: fadeInUp 0.8s ease-out;
            position: relative;
        }

        .error-code::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #ef4444, #f59e0b);
            border-radius: 2px;
        }

        .error-icon {
            width: 80px;
            height: 80px;
            margin: 32px auto;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #ef4444;
            animation: fadeInUp 0.8s ease-out 0.1s both, shake 4s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 85%, 100% { transform: rotate(0deg); }
            88% { transform: rotate(-8deg); }
            91% { transform: rotate(8deg); }
            94% { transform: rotate(-4deg); }
            97% { transform: rotate(4deg); }
        }

        .error-title {
            font-size: clamp(22px, 3.5vw, 32px);
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
            letter-spacing: -0.03em;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .error-desc {
            font-size: 16px;
            color: #6b6b7b;
            margin-bottom: 16px;
            line-height: 1.7;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .error-details {
            background: rgba(239, 68, 68, 0.04);
            border: 1px solid rgba(239, 68, 68, 0.1);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 32px;
            font-size: 13px;
            color: #888;
            animation: fadeInUp 0.8s ease-out 0.35s both;
        }

        .error-details code {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        .error-trace {
            margin-top: 8px;
            text-align: left;
            color: #ef4444;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            font-size: 11px;
            line-height: 1.5;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }

        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.25s;
            letter-spacing: -0.01em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #5850ec, #3b82f6);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 24px rgba(88, 80, 236, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 40px rgba(88, 80, 236, 0.35);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.04);
            color: #a0a0b0;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
            transform: translateY(-2px);
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0.04;
        }
        .shape-1 {
            width: 250px; height: 250px;
            background: #ef4444;
            top: -80px; left: -80px;
            animation: float 7s ease-in-out infinite;
        }
        .shape-2 {
            width: 180px; height: 180px;
            background: #f59e0b;
            bottom: -50px; right: -50px;
            animation: float 5s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .error-actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>
    <div class="bg-gradient"></div>

    <div class="error-container">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>

        <div class="error-code">403</div>

        <div class="error-icon">
            <i class="fas fa-lock"></i>
        </div>

        <h1 class="error-title">Доступ запрещён</h1>
        <p class="error-desc">
            У вас нет прав для доступа к этой странице.
            Если вы считаете, что это ошибка, обратитесь к администратору.
        </p>

        {% if error_message %}
        <div class="error-details">
            <i class="fas fa-info-circle"></i>
            <pre class="error-trace">{{ error_message }}</pre>
        </div>
        {% endif %}

        <div class="error-actions">
            {% if current_user and current_user.is_authenticated %}
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary">
                <i class="fas fa-home"></i> В панель управления
            </a>
            {% else %}
            <a href="{{ url_for('auth.login') }}" class="btn btn-primary">
                <i class="fas fa-sign-in-alt"></i> Войти
            </a>
            {% endif %}
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Назад
            </a>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const PARTICLE_COUNT = 40;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.vx = (Math.random() - 0.5) * 0.3;
                    this.vy = (Math.random() - 0.5) * 0.3;
                    this.radius = Math.random() * 1.2 + 0.3;
                    this.opacity = Math.random() * 0.3 + 0.05;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(239, 68, 68, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        })();
    </script>
</body>
</html>
