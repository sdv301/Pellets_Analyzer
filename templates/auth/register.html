<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — Pellets Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #08080a;
            color: #e8e8ed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(88, 80, 236, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite;
        }
        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-5%, -3%); }
        }
        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
        }
        .auth-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-logo {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; color: #fff; font-size: 18px; font-weight: 700;
            margin-bottom: 32px; letter-spacing: -0.02em;
        }
        .auth-logo .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #5850ec, #3b82f6);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            box-shadow: 0 0 20px rgba(88, 80, 236, 0.3);
        }
        .auth-title {
            font-size: 24px; font-weight: 700; color: #fff; text-align: center;
            margin-bottom: 8px; letter-spacing: -0.02em;
        }
        .auth-subtitle {
            font-size: 14px; color: #666; text-align: center; margin-bottom: 32px;
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block; font-size: 13px; font-weight: 500; color: #888; margin-bottom: 8px;
        }
        .form-input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; color: #fff; font-size: 14px; font-family: inherit;
            transition: all 0.2s; outline: none;
        }
        .form-input::placeholder { color: #444; }
        .form-input:focus {
            border-color: rgba(88, 80, 236, 0.4); background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(88, 80, 236, 0.1);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-submit {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #5850ec, #3b82f6);
            color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
            transition: all 0.25s; margin-top: 8px;
            box-shadow: 0 4px 16px rgba(88, 80, 236, 0.2);
        }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(88, 80, 236, 0.3); }
        .auth-links { text-align: center; margin-top: 24px; }
        .auth-links a { color: #5850ec; text-decoration: none; font-size: 13px; font-weight: 500; transition: color 0.2s; }
        .auth-links a:hover { color: #6b63f0; }
        .auth-divider {
            display: flex; align-items: center; gap: 16px; margin: 24px 0; color: #333; font-size: 12px;
        }
        .auth-divider::before, .auth-divider::after {
            content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06);
        }
        .alert {
            padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #22c55e; }
        .alert-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; }
        .alert-warning { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: #f59e0b; }
        .alert-info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); color: #3b82f6; }
        .form-check { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .form-check input[type="checkbox"] { width: 16px; height: 16px; accent-color: #5850ec; cursor: pointer; }
        .form-check label { font-size: 13px; color: #888; cursor: pointer; }
        .form-check a { color: #5850ec; text-decoration: none; }
        .back-link {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            margin-top: 24px; color: #555; font-size: 13px; text-decoration: none; transition: color 0.2s;
        }
        .back-link:hover { color: #888; }
        .password-strength { height: 4px; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .password-strength .bar { height: 100%; border-radius: 2px; transition: all 0.3s; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <a href="{{ url_for('index') }}" class="auth-logo">
                <div class="logo-icon"><i class="fas fa-flask"></i></div>
                Pellets Analyzer
            </a>
            <h1 class="auth-title">Регистрация</h1>
            <p class="auth-subtitle">Создайте аккаунт для доступа ко всем функциям</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                    <button type="button" style="background:none;border:none;color:inherit;cursor:pointer;font-size:16px;" onclick="this.parentElement.style.display='none'">&times;</button>
                </div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}" id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Имя пользователя</label>
                        <input type="text" name="username" class="form-input" placeholder="username" required minlength="3" maxlength="50">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Полное имя</label>
                        <input type="text" name="full_name" class="form-input" placeholder="Иван Иванов">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Пароль</label>
                    <input type="password" name="password" id="password" class="form-input" placeholder="Минимум 6 символов" required minlength="6">
                    <div class="password-strength">
                        <div class="bar" id="passwordStrength" style="width: 0%; background: transparent;"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Подтверждение пароля</label>
                    <input type="password" name="confirm_password" id="confirmPassword" class="form-input" placeholder="Повторите пароль" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Компания (необязательно)</label>
                    <input type="text" name="company" class="form-input" placeholder="Название компании">
                </div>
                <div class="form-check">
                    <input type="checkbox" id="agreeTerms" required>
                    <label for="agreeTerms">Я согласен с <a href="#">условиями использования</a></label>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-user-plus me-2"></i>Зарегистрироваться
                </button>
            </form>

            <div class="auth-divider">или</div>

            <div class="auth-links">
                <span style="color: #555; font-size: 13px;">Уже есть аккаунт?</span>
                <a href="{{ url_for('login') }}" style="margin-left: 4px;">Войти</a>
            </div>

            <a href="{{ url_for('index') }}" class="back-link">
                <i class="fas fa-home"></i>На главную
            </a>
        </div>
    </div>

    <script>
        document.getElementById('password').addEventListener('input', function() {
            const pwd = this.value;
            let strength = 0;
            if (pwd.length >= 6) strength += 25;
            if (pwd.length >= 10) strength += 25;
            if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) strength += 25;
            if (/[0-9]/.test(pwd) && /[^A-Za-z0-9]/.test(pwd)) strength += 25;

            const bar = document.getElementById('passwordStrength');
            bar.style.width = strength + '%';
            if (strength <= 25) bar.style.background = '#ef4444';
            else if (strength <= 50) bar.style.background = '#f59e0b';
            else if (strength <= 75) bar.style.background = '#3b82f6';
            else bar.style.background = '#22c55e';
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const pwd = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            if (pwd !== confirm) {
                e.preventDefault();
                alert('Пароли не совпадают!');
            }
        });
    </script>
</body>
</html>
