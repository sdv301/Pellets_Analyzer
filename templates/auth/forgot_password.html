<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля — Pellets Analyzer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #08080a;
            color: #e8e8ed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(88, 80, 236, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(59, 130, 246, 0.06) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite;
        }
        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-5%, -3%); }
        }
        .auth-container {
            position: relative; z-index: 1; width: 100%; max-width: 420px;
        }
        .auth-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 40px 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-logo {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none; color: #fff; font-size: 18px; font-weight: 700;
            margin-bottom: 32px; letter-spacing: -0.02em;
        }
        .auth-logo .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #5850ec, #3b82f6);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            box-shadow: 0 0 20px rgba(88, 80, 236, 0.3);
        }
        .auth-title {
            font-size: 24px; font-weight: 700; color: #fff; text-align: center;
            margin-bottom: 8px; letter-spacing: -0.02em;
        }
        .auth-subtitle {
            font-size: 14px; color: #666; text-align: center; margin-bottom: 32px;
        }
        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block; font-size: 13px; font-weight: 500; color: #888; margin-bottom: 8px;
        }
        .form-input {
            width: 100%; padding: 12px 16px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; color: #fff; font-size: 14px; font-family: inherit;
            transition: all 0.2s; outline: none;
        }
        .form-input::placeholder { color: #444; }
        .form-input:focus {
            border-color: rgba(88, 80, 236, 0.4); background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 3px rgba(88, 80, 236, 0.1);
        }
        .btn-submit {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #5850ec, #3b82f6);
            color: #fff; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
            transition: all 0.25s; margin-top: 8px;
            box-shadow: 0 4px 16px rgba(88, 80, 236, 0.2);
        }
        .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(88, 80, 236, 0.3); }
        .alert {
            padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #22c55e; }
        .alert-danger { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #ef4444; }
        .alert-warning { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); color: #f59e0b; }
        .alert-info { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.2); color: #3b82f6; }
        .back-link {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            margin-top: 24px; color: #555; font-size: 13px; text-decoration: none; transition: color 0.2s;
        }
        .back-link:hover { color: #888; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <a href="{{ url_for('index') }}" class="auth-logo">
                <div class="logo-icon"><i class="fas fa-flask"></i></div>
                Pellets Analyzer
            </a>
            <h1 class="auth-title">Сброс пароля</h1>
            <p class="auth-subtitle">Введите email для получения ссылки на сброс пароля</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                    <button type="button" style="background:none;border:none;color:inherit;cursor:pointer;font-size:16px;" onclick="this.parentElement.style.display='none'">&times;</button>
                </div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('forgot_password') }}">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" placeholder="your@email.com" required autofocus>
                </div>
                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane me-2"></i>Отправить ссылку
                </button>
            </form>

            <a href="{{ url_for('login') }}" class="back-link">
                <i class="fas fa-arrow-left"></i>Вернуться ко входу
            </a>
        </div>
    </div>
</body>
</html>
