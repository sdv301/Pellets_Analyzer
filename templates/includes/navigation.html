<nav class="navbar navbar-main navbar-expand-lg px-0 mx-4 shadow-none border-radius-xl" id="navbarBlur"
  navbar-scroll="true">
  <div class="container-fluid py-1 px-3">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb bg-transparent mb-0 pb-0 pt-1 px-0 me-sm-6 me-5">
        <li class="breadcrumb-item text-sm"><a class="opacity-5 text-dark" href="{{ url_for('main.dashboard') }}">Главная</a>
        </li>
        <li class="breadcrumb-item text-sm text-dark active" aria-current="page">{{ segment|replace("_", " ") }}</li>
      </ol>
      <h6 class="font-weight-bolder mb-0">{{ segment|replace("_", " ") }}</h6>
    </nav>
    <div class="collapse navbar-collapse mt-sm-0 mt-2 me-md-0 me-sm-4" id="navbar">
      <div class="ms-md-auto pe-md-3 d-flex align-items-center position-relative">
        <div class="input-group">
          <span class="input-group-text text-body"><i class="fas fa-search" aria-hidden="true"></i></span>
          <input type="text" id="globalSearchInput" class="form-control" placeholder="Быстрый поиск состава...">
        </div>

        <!-- Выпадающий список результатов -->
        <ul id="globalSearchResults" class="dropdown-menu shadow-lg border-0 w-100 mt-5"
          style="display: none; position: absolute; top: 100%; left: 0; z-index: 1000; border-radius: 12px; max-height: 300px; overflow-y: auto;">
          <!-- Результаты будут здесь -->
        </ul>
      </div>
            <ul class="navbar-nav justify-content-end">
                <li class="nav-item d-flex align-items-center me-3">
          <a href="javascript:;" class="nav-link text-body p-0" id="themeToggleBtn" title="Переключить тему">
            <i class="fas fa-moon" id="moonIcon" style="font-size: 1.1rem;"></i>
            <i class="fas fa-sun d-none" id="sunIcon" style="font-size: 1.1rem;"></i>
          </a>
        </li>
        <li class="nav-item d-flex align-items-center">
          {% if current_user and current_user.is_authenticated %}
          <a href="{{ url_for('auth.profile') }}" class="nav-link text-body p-0 me-2" title="Профиль">
            <i class="fas fa-user-circle" style="font-size: 1.3rem;"></i>
          </a>
          {% if current_user.role_name == 'admin' %}
          <a href="{{ url_for('admin.admin_dashboard') }}" class="nav-link text-body p-0 me-2" title="Админ-панель">
            <i class="fas fa-shield-alt" style="font-size: 1.1rem;"></i>
          </a>
          {% endif %}
          <a href="{{ url_for('auth.logout') }}" class="nav-link text-body p-0" title="Выйти">
            <i class="fas fa-sign-out-alt" style="font-size: 1.1rem;"></i>
          </a>
          {% else %}
          <a href="{{ url_for('auth.login') }}" class="nav-link text-body p-0 me-2" title="Войти">
            <i class="fas fa-sign-in-alt" style="font-size: 1.1rem;"></i>
          </a>
          <a href="{{ url_for('auth.register') }}" class="btn btn-sm btn-primary rounded-pill px-3">
            <i class="fas fa-user-plus me-1"></i>Регистрация
          </a>
          {% endif %}
        </li>
        <li class="nav-item d-xl-none ps-3 d-flex align-items-center">
          <a href="javascript:;" class="nav-link text-body p-0" id="iconNavbarSidenav">
            <div class="sidenav-toggler-inner">
              <i class="sidenav-toggler-line"></i>
              <i class="sidenav-toggler-line"></i>
              <i class="sidenav-toggler-line"></i>
            </div>
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const searchInput = document.getElementById('globalSearchInput');
    const resultsContainer = document.getElementById('globalSearchResults');
        const themeToggleBtn = document.getElementById('themeToggleBtn');
    const moonIcon = document.getElementById('moonIcon');
    const sunIcon = document.getElementById('sunIcon');
    let searchTimeout;

    // Инициализация темы
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    function applyDarkTheme() {
      document.documentElement.setAttribute('data-theme', 'dark');
      moonIcon.classList.add('d-none');
      sunIcon.classList.remove('d-none');
      localStorage.setItem('theme', 'dark');
    }

    function applyLightTheme() {
      document.documentElement.removeAttribute('data-theme');
      moonIcon.classList.remove('d-none');
      sunIcon.classList.add('d-none');
      localStorage.setItem('theme', 'light');
    }

    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      applyDarkTheme();
    } else {
      applyLightTheme();
    }

    // Обработчик переключения
    if (themeToggleBtn) {
      themeToggleBtn.addEventListener('click', function () {
        if (document.documentElement.getAttribute('data-theme') === 'dark') {
          applyLightTheme();
        } else {
          applyDarkTheme();
        }
      });
    }

    if (searchInput) {
      searchInput.addEventListener('input', function () {
        clearTimeout(searchTimeout);
        const query = this.value.trim();

        if (query.length < 2) {
          resultsContainer.style.display = 'none';
          return;
        }

        searchTimeout = setTimeout(async () => {
          try {
            const response = await fetch(`/global_search?q=${encodeURIComponent(query)}`);
            const data = await response.json();

            resultsContainer.innerHTML = '';

            if (data.success && data.results.length > 0) {
              data.results.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `
                                <a class="dropdown-item py-2 d-flex justify-content-between align-items-center" href="/tables?search=${encodeURIComponent(item.composition)}">
                                    <div>
                                        <h6 class="mb-0 text-sm font-weight-bold text-dark text-truncate" style="max-width: 200px;" title="${item.composition}">${item.composition}</h6>
                                        <p class="text-xs text-muted mb-0">Теплота: ${item.q ? item.q + ' МДж/кг' : 'N/A'} | Зольность: ${item.ad ? item.ad + '%' : 'N/A'}</p>
                                    </div>
                                    <i class="fas fa-arrow-right text-xs text-primary ms-2"></i>
                                </a>
                            `;
                resultsContainer.appendChild(li);
              });
              resultsContainer.style.display = 'block';
            } else {
              resultsContainer.innerHTML = `
                            <li><span class="dropdown-item text-muted text-sm py-2">Составы не найдены</span></li>
                        `;
              resultsContainer.style.display = 'block';
            }
          } catch (error) {
            console.error('Ошибка глобального поиска:', error);
          }
        }, 300); // 300ms debounce
      });

      // Скрывать при клике вне
      document.addEventListener('click', function (e) {
        if (!searchInput.contains(e.target) && !resultsContainer.contains(e.target)) {
          resultsContainer.style.display = 'none';
        }
      });
    }
  });
</script>
