<!-- ЗАЩИТНЫЙ ПАТЧ: предотвращает ошибку removeChild в soft-ui-dashboard.min.js -->
<script>
    // Патчим Element.prototype.removeChild чтобы не падал на null
    (function() {
        var origRemoveChild = Element.prototype.removeChild;
        Element.prototype.removeChild = function(child) {
            if (child === null || child === undefined) return null;
            try {
                return origRemoveChild.call(this, child);
            } catch(e) {
                return null;
            }
        };
    })();
</script>

<!-- Premium UI Scroll Animations -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    // Optional: Stop observing once animated
                    // observer.unobserve(entry.target); 
                }
            });
        }, observerOptions);

        document.querySelectorAll('.animate-on-scroll').forEach((elem) => {
            observer.observe(elem);
        });
    });
</script>
