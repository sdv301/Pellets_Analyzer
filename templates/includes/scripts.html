<!-- ЗАЩИТНЫЙ ПАТЧ: предотвращает ошибку removeChild в soft-ui-dashboard.min.js -->
<script>
    // Патчим Element.prototype.removeChild чтобы не падал на null
    (function() {
        var origRemoveChild = Element.prototype.removeChild;
        Element.prototype.removeChild = function(child) {
            if (child === null || child === undefined) return null;
            try {
                return origRemoveChild.call(this, child);
            } catch(e) {
                return null;
            }
        };
    })();
</script>

<script>
    var win = navigator.platform.indexOf('Win') > -1;
    if (win && typeof Scrollbar !== 'undefined' && document.querySelector('#sidenav-scrollbar')) {
        var options = {
            damping: '0.5'
        }
        Scrollbar.init(document.querySelector('#sidenav-scrollbar'), options);
    }
</script>

<!-- Chart.js & Bootstrap Notify -->
<script>
    // Toast-уведомления через Bootstrap Notify
    function showNotify(message, type = 'info') {
        const icons = {
            success: 'fas fa-check-circle',
            danger: 'fas fa-exclamation-circle',
            warning: 'fas fa-exclamation-triangle',
            info: 'fas fa-info-circle'
        };
        if (window.jQuery && typeof $.notify === 'function') {
            $.notify({
                icon: icons[type] || icons.info,
                message: message
            }, {
                type: type,
                allow_dismiss: true,
                newest_on_top: true,
                placement: { from: 'top', align: 'right' },
                offset: { x: 20, y: 80 },
                spacing: 10,
                z_index: 9999,
                delay: 3000,
                timer: 1000,
                animate: { enter: 'animated fadeInDown', exit: 'animated fadeOutUp' }
            });
            return;
        }
        // Minimal safe fallback if notify dependencies are unavailable
        console.log('notify[' + type + ']: ' + message);
    }
</script>

<!-- Premium UI Scroll Animations -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const observerOptions = {
            root: null,
            rootMargin: '0px',
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries, observer) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.animate-on-scroll').forEach((elem) => {
            observer.observe(elem);
        });
    });
</script>
