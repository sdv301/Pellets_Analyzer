[pytest]
testpaths = tests
python_files = test_*.py
norecursedirs = test-project
addopts = -ra --strict-markers --cov=app --cov-report=term-missing --cov-report=xml
markers =
    unit: Fast isolated unit tests
    integration: Integration tests with Flask app and SQLite
    smoke: Minimal end-to-end smoke checks
    performance: Performance-oriented checks
