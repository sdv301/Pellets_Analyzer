# ============================================================
# Pellets Analyzer — Nginx Production конфигурация
# Сервер: 185.210.154.20 (без SSL, работает по IP)
# ============================================================

events {
    worker_connections 1024;
}

http {
    # --- Безопасность ---
    server_tokens off;

    # Security заголовки
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' https://*.creative-tim.com https://*.cloudflare.com https://*.googleapis.com https://*.gstatic.com https://*.jsdelivr.net; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://demos.creative-tim.com https://fonts.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://demos.creative-tim.com; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_status 429;

    # Размер загружаемых файлов
    client_max_body_size 50M;

    # Буферы
    client_body_buffer_size 128k;
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;

    upstream pellets_app {
        server web:5000;
    }

    server {
        listen 80;
        server_name _;

        # --- Логи ---
        access_log /var/log/nginx/pellets-access.log;
        error_log /var/log/nginx/pellets-error.log;

        # --- Статические файлы ---
        location /static/ {
            proxy_pass http://pellets_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # --- Загрузка файлов ---
        location /uploads/ {
            proxy_pass http://pellets_app;
            internal;
        }

        # --- Основное приложение ---
        location / {
            limit_req zone=general burst=20 nodelay;

            proxy_pass http://pellets_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Таймауты (для ML-операций и обработки данных)
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # --- Защита эндпоинтов авторизации ---
        location /auth/login {
            limit_req zone=login burst=3 nodelay;

            proxy_pass http://pellets_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /auth/register {
            limit_req zone=login burst=3 nodelay;

            proxy_pass http://pellets_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- API endpoints ---
        location /api/ {
            limit_req zone=api burst=10 nodelay;

            proxy_pass http://pellets_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- Запрет доступа к скрытым файлам ---
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # --- Запрет доступа к конфигам ---
        location ~* \.(json|yml|yaml|env|ini|cfg|conf)$ {
            deny all;
        }
    }
}
